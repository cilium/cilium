---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: ciliumvtepnodeconfigs.cilium.io
spec:
  group: cilium.io
  names:
    categories:
    - cilium
    kind: CiliumVTEPNodeConfig
    listKind: CiliumVTEPNodeConfigList
    plural: ciliumvtepnodeconfigs
    shortNames:
    - cvtepnode
    singular: ciliumvtepnodeconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CiliumVTEPNodeConfig is node-local VTEP configuration for the Cilium agent.
          Name of the object should be the node name.
          This resource will be created by the Cilium operator and is read-only for the
          users. The operator resolves the VTEP endpoints that apply to the node (by
          evaluating each CiliumVTEPConfig's nodeSelector) and writes them into the Spec.
          The agent running on that node is the sole writer of the Status subresource,
          which it updates only after its local BPF map sync completes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec contains the VTEP endpoints resolved for this node by
              the operator.
            properties:
              vtepEndpoints:
                description: |-
                  VTEPEndpoints is the list of VTEP endpoints the operator resolved for this
                  node from all matching CiliumVTEPConfig objects (after CIDR-conflict
                  resolution). It may be empty if every endpoint that would apply to the node
                  is in conflict.
                items:
                  description: VTEPEndpoint defines a single VTEP endpoint configuration.
                  properties:
                    cidr:
                      description: |-
                        CIDR is the destination network prefix that will be routed via this VTEP.
                        Traffic with destinations matching this CIDR will be encapsulated and
                        sent to the TunnelEndpoint.
                      pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/([0-9]|[1-2][0-9]|3[0-2])$
                      type: string
                    mac:
                      description: |-
                        MAC is the destination MAC address to use when encapsulating traffic
                        destined for this VTEP endpoint.
                      pattern: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
                      type: string
                    name:
                      description: |-
                        Name is a unique identifier for this VTEP endpoint within the configuration.
                        Used for tracking status and managing updates.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    tunnelEndpoint:
                      description: |-
                        TunnelEndpoint is the IPv4 address of the remote VTEP device.
                        Traffic destined for the CIDR will be encapsulated and sent to this address.
                      pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                      type: string
                  required:
                  - cidr
                  - mac
                  - name
                  - tunnelEndpoint
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
          status:
            description: |-
              Status is the most recently observed status of the CiliumVTEPNodeConfig,
              written exclusively by the agent on this node.
            properties:
              conditions:
                description: Conditions describe the current state of the node's VTEP
                  configuration.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpointCount:
                description: EndpointCount is the number of VTEP endpoints currently
                  programmed on the node.
                format: int32
                type: integer
              vtepEndpointStatuses:
                description: VTEPEndpointStatuses contains per-endpoint sync state
                  for this node.
                items:
                  description: VTEPEndpointStatus contains the status of a single
                    VTEP endpoint on a node.
                  properties:
                    error:
                      description: |-
                        Error contains any error message from the last sync attempt.
                        Empty when the endpoint is successfully synced.
                      type: string
                    lastSyncTime:
                      description: LastSyncTime is the last time this endpoint was
                        successfully synced.
                      format: date-time
                      type: string
                    name:
                      description: Name is the name of the VTEP endpoint.
                      type: string
                    synced:
                      description: Synced indicates whether this endpoint is successfully
                        synced to the BPF map.
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
