---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: ciliumvtepconfigs.cilium.io
spec:
  group: cilium.io
  names:
    categories:
    - cilium
    kind: CiliumVTEPConfig
    listKind: CiliumVTEPConfigList
    plural: ciliumvtepconfigs
    shortNames:
    - cvtep
    singular: ciliumvtepconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.endpointCount
      name: Endpoints
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="HealthMonitoring")].status
      name: Health
      type: string
    - jsonPath: .status.conditions[?(@.type=="FailoverReady")].status
      name: Failover
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2
    schema:
      openAPIV3Schema:
        description: |-
          CiliumVTEPConfig is a Kubernetes custom resource which defines
          VXLAN Tunnel Endpoint (VTEP) configurations for the cluster.
          It enables dynamic configuration of VTEP endpoints without
          requiring Cilium agent restarts.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired VTEP configuration.
            properties:
              cidrMask:
                default: 255.255.255.0
                description: |-
                  CIDRMask is the network mask used for VTEP CIDR lookups in the BPF map.
                  This mask is applied to destination IPs to determine which VTEP endpoint
                  should handle the traffic. Defaults to "255.255.255.0" if not specified.
                pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                type: string
              endpoints:
                description: |-
                  Endpoints is the list of VTEP endpoint configurations.
                  Maximum 8 endpoints are supported due to BPF map size constraints.
                items:
                  description: |-
                    VTEPEndpoint defines a single VTEP endpoint configuration with
                    optional active/standby failover support.
                  properties:
                    cidr:
                      description: |-
                        CIDR is the destination network prefix that will be routed via this VTEP.
                        Traffic with destinations matching this CIDR will be encapsulated and
                        sent to the TunnelEndpoint.
                      pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/([0-9]|[1-2][0-9]|3[0-2])$
                      type: string
                    mac:
                      description: |-
                        MAC is the destination MAC address to use when encapsulating traffic
                        destined for this VTEP endpoint.
                      pattern: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
                      type: string
                    name:
                      description: |-
                        Name is a unique identifier for this VTEP endpoint within the configuration.
                        Used for tracking status and managing updates.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    standby:
                      description: |-
                        Standby is an optional backup tunnel connection for this CIDR.
                        When configured, ICMP health monitoring is enabled for both the primary
                        (TunnelEndpoint/MAC) and standby connections. If the primary connection
                        fails health checks, traffic automatically switches to the standby.
                        The standby TunnelEndpoint must differ from the primary TunnelEndpoint.
                      properties:
                        mac:
                          description: |-
                            MAC is the destination MAC address for encapsulated traffic
                            sent to the standby VTEP device.
                          pattern: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
                          type: string
                        tunnelEndpoint:
                          description: TunnelEndpoint is the IPv4 address of the standby
                            remote VTEP device.
                          pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                          type: string
                      required:
                      - mac
                      - tunnelEndpoint
                      type: object
                    tunnelEndpoint:
                      description: |-
                        TunnelEndpoint is the IPv4 address of the primary remote VTEP device.
                        Traffic destined for the CIDR will be encapsulated and sent to this address.
                      pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                      type: string
                  required:
                  - cidr
                  - mac
                  - name
                  - tunnelEndpoint
                  type: object
                maxItems: 8
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - endpoints
            type: object
          status:
            description: Status contains the observed state of the VTEP configuration.
            properties:
              conditions:
                description: Conditions describe the current state of the VTEP configuration.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpointCount:
                description: EndpointCount is the number of VTEP endpoints currently
                  configured.
                type: integer
              endpointStatuses:
                description: EndpointStatuses contains per-endpoint status information.
                items:
                  description: VTEPEndpointStatus contains the status of a single
                    VTEP endpoint.
                  properties:
                    activeRole:
                      description: |-
                        ActiveRole indicates which connection is currently serving traffic.
                        "primary" means the top-level TunnelEndpoint/MAC is active.
                        "standby" means the standby connection is active due to failover.
                        Empty when no standby is configured.
                      enum:
                      - primary
                      - standby
                      - ""
                      type: string
                    error:
                      description: |-
                        Error contains any error message from the last sync attempt.
                        Empty when the endpoint is successfully synced.
                      type: string
                    failoverCount:
                      description: FailoverCount is the total number of failover events
                        for this endpoint.
                      format: int32
                      type: integer
                    lastFailoverTime:
                      description: LastFailoverTime is when the last failover event
                        occurred for this endpoint.
                      format: date-time
                      type: string
                    lastSyncTime:
                      description: LastSyncTime is the last time this endpoint was
                        successfully synced.
                      format: date-time
                      type: string
                    name:
                      description: Name is the name of the VTEP endpoint.
                      type: string
                    primaryHealth:
                      description: |-
                        PrimaryHealth is the health status of the primary (top-level) connection.
                        Only populated when a standby connection is configured.
                      properties:
                        consecutiveFailures:
                          description: |-
                            ConsecutiveFailures is the number of consecutive probe failures.
                            Reset to 0 on a successful probe.
                          type: integer
                        healthy:
                          description: Healthy indicates whether the connection is
                            currently reachable via ICMP.
                          type: boolean
                        lastProbeTime:
                          description: LastProbeTime is when the last health probe
                            was sent.
                          format: date-time
                          type: string
                        lastSuccessTime:
                          description: LastSuccessTime is when the last successful
                            probe response was received.
                          format: date-time
                          type: string
                        latencyMs:
                          description: LatencyMs is the round-trip time of the last
                            successful probe in milliseconds.
                          format: int64
                          type: integer
                        tunnelEndpoint:
                          description: TunnelEndpoint is the IP address being health-checked.
                          type: string
                      type: object
                    standbyHealth:
                      description: |-
                        StandbyHealth is the health status of the standby connection.
                        Only populated when a standby connection is configured.
                      properties:
                        consecutiveFailures:
                          description: |-
                            ConsecutiveFailures is the number of consecutive probe failures.
                            Reset to 0 on a successful probe.
                          type: integer
                        healthy:
                          description: Healthy indicates whether the connection is
                            currently reachable via ICMP.
                          type: boolean
                        lastProbeTime:
                          description: LastProbeTime is when the last health probe
                            was sent.
                          format: date-time
                          type: string
                        lastSuccessTime:
                          description: LastSuccessTime is when the last successful
                            probe response was received.
                          format: date-time
                          type: string
                        latencyMs:
                          description: LatencyMs is the round-trip time of the last
                            successful probe in milliseconds.
                          format: int64
                          type: integer
                        tunnelEndpoint:
                          description: TunnelEndpoint is the IP address being health-checked.
                          type: string
                      type: object
                    synced:
                      description: Synced indicates whether this endpoint is successfully
                        synced to the BPF map.
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
