apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ext-proc-gateway
spec:
  gatewayClassName: cilium
  listeners:
    - protocol: HTTP
      port: 80
      name: web-gw
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: cilium.io/v2alpha1
kind: CiliumEnvoyExtProcFilter
metadata:
  name: my-ext-proc
spec:
  backendRef:
    name: ext-proc-service
    port: 4317
  # failureModeAllow defaults to false (fail-closed).
  # Set to true to allow requests to proceed when the ext_proc service
  # is unavailable.
  failureModeAllow: false
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ext-proc-route
spec:
  parentRefs:
    - name: ext-proc-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: ExtensionRef
          extensionRef:
            group: cilium.io
            kind: CiliumEnvoyExtProcFilter
            name: my-ext-proc
      backendRefs:
        - name: echo-1
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-1
          port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ext-proc-service
  name: ext-proc-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-proc-service
  template:
    metadata:
      labels:
        app: ext-proc-service
    spec:
      containers:
        - name: ext-proc
          # Replace with your own ext_proc gRPC server implementation.
          # The server must implement the Envoy External Processing API:
          # https://www.envoyproxy.io/docs/envoy/latest/api-v3/service/ext_proc/v3/external_processor.proto
          image: replace/with-your-ext-proc-server:latest
          ports:
            - containerPort: 4317
              name: grpc
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ext-proc-service
  name: ext-proc-service
spec:
  selector:
    app: ext-proc-service
  ports:
    - port: 4317
      protocol: TCP
      targetPort: grpc
