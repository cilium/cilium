apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: migrate-svc-client
spec:
  replicas: 5
  selector:
    matchLabels:
      app: migrate-svc-client
  template:
    metadata:
      labels:
        app: migrate-svc-client
        zgroup: migrate-svc
    spec:
      containers:
      - name: server
        image: docker.io/brb0/cilium-migrate-svc-test:latest
        imagePullPolicy: IfNotPresent
        command: [ "/client", "migrate-svc.default.svc.cluster.local.:8000" ]
