apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
description: "L3-L4 policy"
metadata:
  name: "l3-l4-policy-app4"
spec:
  endpointSelector:
    matchLabels:
      id: app4
  ingress:
  - fromEndpoints:
    - matchLabels:
        id: app2
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
