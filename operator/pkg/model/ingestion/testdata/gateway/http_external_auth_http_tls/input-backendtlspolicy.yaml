policies:
  - svcName: default/auth-service
    valid:
      "":
        apiVersion: gateway.networking.k8s.io/v1alpha3
        kind: BackendTLSPolicy
        metadata:
          name: auth-tls
          namespace: default
        spec:
          targetRefs:
            - group: ""
              kind: Service
              name: "auth-service"
          validation:
            caCertificateRefs:
              - group: ""
                kind: ConfigMap
                name: "auth-ca-certificate"
            hostname: "auth.example.com"
