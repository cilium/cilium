http:
  - hostname: "*"
    name: prod-web-gw
    port: 80
    routes:
      - backends:
          - TLS: null
            name: api-service
            namespace: default
            port:
              port: 8080
        extension_ref_filters:
          - backend:
              TLS: null
              name: ext-proc-service
              namespace: default
              port:
                port: 4317
            config: CjgKNgodZGVmYXVsdDpleHQtcHJvYy1zZXJ2aWNlOjQzMTcSFWV4dC1wcm9jLXNlcnZpY2U6NDMxN0IaY2VlcGYuZGVmYXVsdC5teV9leHRfcHJvYy4=
            name: envoy.filters.http.ext_proc/default/my-ext-proc
            type_url: type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
        path_match:
          prefix: /api
        timeout: {}
      - backends:
          - TLS: null
            name: health-service
            namespace: default
            port:
              port: 8080
        path_match:
          prefix: /health
        timeout: {}
    sources:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: my-gateway
        namespace: default
        version: v1
