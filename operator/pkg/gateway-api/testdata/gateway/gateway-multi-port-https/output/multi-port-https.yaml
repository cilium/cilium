apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: multi-port-https
  namespace: gateway-conformance-infra
  resourceVersion: "1000"
spec:
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: "*.example.test"
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: multi-port-https-tls
            namespace: gateway-conformance-infra
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: "*.example.test"
      name: grpcs
      port: 50051
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: multi-port-https-tls
            namespace: gateway-conformance-infra
status:
  addresses:
    - type: IPAddress
      value: 172.18.255.200
  conditions:
    - lastTransitionTime: "2026-04-16T22:17:55Z"
      message: Gateway successfully scheduled
      reason: Accepted
      status: "True"
      type: Accepted
    - lastTransitionTime: "2026-04-16T22:17:55Z"
      message: Gateway Programmed
      reason: Programmed
      status: "True"
      type: Programmed
  listeners:
    - attachedRoutes: 1
      conditions:
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Resolved Refs
          reason: ResolvedRefs
          status: "True"
          type: ResolvedRefs
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Listener Accepted
          reason: Accepted
          status: "True"
          type: Accepted
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Listener Programmed
          reason: Programmed
          status: "True"
          type: Programmed
      name: https
      supportedKinds:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
    - attachedRoutes: 1
      conditions:
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Resolved Refs
          reason: ResolvedRefs
          status: "True"
          type: ResolvedRefs
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Listener Accepted
          reason: Accepted
          status: "True"
          type: Accepted
        - lastTransitionTime: "2026-04-16T22:17:55Z"
          message: Listener Programmed
          reason: Programmed
