apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: multi-port-https-with-multi-port-tls-passthrough
  namespace: gateway-conformance-infra
  resourceVersion: "1000"
spec:
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: web.example.test
      name: https-443
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: multi-port-https-tls
            namespace: gateway-conformance-infra
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: api.example.test
      name: https-50051
      port: 50051
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: multi-port-https-tls
            namespace: gateway-conformance-infra
    - allowedRoutes:
        kinds:
          - kind: TLSRoute
        namespaces:
          from: Same
      hostname: tls.example.test
      name: tls-8443
      port: 8443
      protocol: TLS
      tls:
        mode: Passthrough
    - allowedRoutes:
        kinds:
          - kind: TLSRoute
        namespaces:
          from: Same
      hostname: tls.example.test
      name: tls-9443
      port: 9443
      protocol: TLS
      tls:
        mode: Passthrough
