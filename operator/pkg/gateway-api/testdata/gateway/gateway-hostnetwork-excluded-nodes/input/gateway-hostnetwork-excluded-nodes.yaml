apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
---
apiVersion: v1
kind: Service
metadata:
  name: cilium-gateway-test-gateway
  namespace: gateway-conformance-infra
  labels:
    io.cilium.gateway/owning-gateway: test-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Node
metadata:
  name: node-1
status:
  addresses:
    - type: InternalIP
      address: 10.0.0.1
---
apiVersion: v1
kind: Node
metadata:
  name: node-excluded
  labels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""
status:
  addresses:
    - type: InternalIP
      address: 10.0.0.2
