apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cross-protocol-same-hostname
  namespace: gateway-conformance-infra
  resourceVersion: "1000"
spec:
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: api.example.test
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: cross-protocol-tls
            namespace: gateway-conformance-infra
    - allowedRoutes:
        kinds:
          - kind: TLSRoute
        namespaces:
          from: Same
      hostname: api.example.test
      name: tls-passthrough
      port: 9443
      protocol: TLS
      tls:
        mode: Passthrough
status:
  addresses:
    - type: IPAddress
      value: 172.18.255.200
  conditions:
    - lastTransitionTime: "2026-05-05T19:06:19Z"
      message: Gateway successfully scheduled
      reason: Accepted
      status: "True"
      type: Accepted
    - lastTransitionTime: "2026-05-05T19:06:19Z"
      message: Gateway Programmed
      reason: Programmed
      status: "True"
      type: Programmed
  listeners:
    - attachedRoutes: 1
      conditions:
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Resolved Refs
          reason: ResolvedRefs
          status: "True"
          type: ResolvedRefs
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Listener Accepted
          reason: Accepted
          status: "True"
          type: Accepted
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Listener Programmed
          reason: Programmed
          status: "True"
          type: Programmed
      name: https
      supportedKinds:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
    - attachedRoutes: 1
      conditions:
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Resolved Refs
          reason: ResolvedRefs
          status: "True"
          type: ResolvedRefs
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Listener Accepted
          reason: Accepted
          status: "True"
          type: Accepted
        - lastTransitionTime: "2026-05-05T19:06:19Z"
          message: Listener Programmed
          reason: Programmed
          status: "True"
          type: Programmed
      name: tls-passthrough
      supportedKinds:
        - group: gateway.networking.k8s.io
          kind: TLSRoute
