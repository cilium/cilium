apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: route-hostname-independence
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  allowedListeners:
    namespaces:
      from: Same
  listeners:
  - name: gateway-http
    # This hostname must not restrict Routes attached to a ListenerSet.
    hostname: gateway.example.com
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: delegated-listeners
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: route-hostname-independence
  listeners:
  - name: echo
    hostname: echo.example.com
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: delegated-listeners
    sectionName: echo
  hostnames:
  - echo.example.com
  rules:
  - backendRefs:
    - name: infra-backend-v1
      port: 8080
