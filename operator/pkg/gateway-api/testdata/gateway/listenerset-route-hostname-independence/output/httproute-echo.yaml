apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: delegated-listeners
    sectionName: echo
  hostnames:
  - echo.example.com
  rules:
  - backendRefs:
    - name: infra-backend-v1
      port: 8080
status:
  parents:
  - parentRef:
      group: gateway.networking.k8s.io
      kind: ListenerSet
      name: delegated-listeners
      sectionName: echo
    controllerName: io.cilium/gateway-controller
    conditions:
    - type: Accepted
      status: "True"
      reason: Accepted
      message: Accepted HTTPRoute
    - type: ResolvedRefs
      status: "True"
      reason: ResolvedRefs
      message: Service reference is valid
