apiVersion: v1
kind: Namespace
metadata:
  name: team-a-ns
  labels:
    kubernetes.io/metadata.name: team-a-ns
    team: frontend
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b-ns
  labels:
    kubernetes.io/metadata.name: team-b-ns
    team: backend
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: allowed-namespace-selector
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  allowedListeners:
    namespaces:
      from: Selector
      selector:
        matchLabels:
          team: frontend
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: matching-namespace
  namespace: team-a-ns
spec:
  parentRef:
    name: allowed-namespace-selector
    namespace: gateway-conformance-infra
  listeners:
    - name: extra-http
      port: 8080
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: non-matching-namespace
  namespace: team-b-ns
spec:
  parentRef:
    name: allowed-namespace-selector
    namespace: gateway-conformance-infra
  listeners:
    - name: extra-http
      port: 9090
      protocol: HTTP
