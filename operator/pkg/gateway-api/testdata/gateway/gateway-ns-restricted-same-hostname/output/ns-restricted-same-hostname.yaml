apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ns-restricted-same-hostname
  namespace: gateway-conformance-infra
  resourceVersion: "1000"
spec:
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: api.example.test
      name: https-restricted
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: ns-restricted-tls
            namespace: gateway-conformance-infra
    - allowedRoutes:
        namespaces:
          from: All
      hostname: api.example.test
      name: https-open
      port: 50051
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: ns-restricted-tls
            namespace: gateway-conformance-infra
