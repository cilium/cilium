name: Alignment Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  align-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make

      - name: Compile bpf_alignchecker.o
        run: make -C bpf bpf_alignchecker.o
        env:
          CLANG: clang
          LLC: llc

      - name: Run alignment checker
        run: |
          go build -o cilium-align-checker ./tools/alignchecker
          ./cilium-align-checker bpf/bpf_alignchecker.o