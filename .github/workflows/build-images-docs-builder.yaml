name: Docs-builder Image Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.PR-number }}
  cancel-in-progress: true

jobs:
  pr-info:
    name: Get PR Info
    runs-on: ubuntu-24.04
    outputs:
      head-ref: ${{ steps.pr.outputs.head_ref }}
      head-repo-full-name: ${{ steps.pr.outputs.head_repo_full_name }}
    steps:
      - name: Get pull request info
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ inputs.PR-number }}'),
            })
            core.setOutput('head_ref', pr.head.ref)
            core.setOutput('head_repo_full_name', pr.head.repo.full_name)

  build-and-push:
    needs: pr-info
    name: Build and Push Image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: docs-builder
      deployment: false
    outputs:
      tag: ${{ steps.docs-builder-tag.outputs.tag }}
      digest: ${{ steps.docker-build-docs-builder.outputs.digest }}
    steps:
      - name: Checkout base branch (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base-SHA || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Set environment variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.SHA }}

      - name: Generate image tag for docs-builder
        id: docs-builder-tag
        run: |
          echo tag="$(git ls-tree --full-tree HEAD -- ./Documentation | awk '{ print $3 }')" >> $GITHUB_OUTPUT

      - name: Check if tag for docs-builder already exists
        id: docs-builder-tag-in-repositories
        shell: bash
        run: |
          if docker buildx imagetools inspect ${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/docs-builder:${{ steps.docs-builder-tag.outputs.tag }} &>/dev/null; then
            echo exists="true" >> $GITHUB_OUTPUT
          else
            echo exists="false" >> $GITHUB_OUTPUT
          fi

      - name: Login to ${{ env.REGISTRY_DEV }}
        if: ${{ steps.docs-builder-tag-in-repositories.outputs.exists == 'false' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_DEV }}
          username: ${{ secrets.QUAY_DOCS_BUILDER_USERNAME }}
          password: ${{ secrets.QUAY_DOCS_BUILDER_PASSWORD }}
          logout: true

      - name: Build docs-builder image
        if: ${{ steps.docs-builder-tag-in-repositories.outputs.exists == 'false' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: docker-build-docs-builder
        with:
          provenance: false
          context: ./Documentation
          file: ./Documentation/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/docs-builder:${{ steps.docs-builder-tag.outputs.tag }}

  # Use a separate job for the steps below, to ensure we're no longer logged
  # into Quay.io.
  # This job runs the untrusted PR-built container to prepare the update.
  # No environment/secrets are available here — the result is passed as a
  # patch artifact to a clean privileged job for pushing.
  prepare-update:
    name: Prepare docs-builder image reference update
    needs: [pr-info, build-and-push]
    if: needs.build-and-push.outputs.digest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout base branch (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base-SHA || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set environment variables
        uses: ./.github/actions/set-env-variables

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.SHA }}

      - name: Set up git
        run: |
          git config user.name "Cilium Imagebot"
          git config user.email "noreply@cilium.io"

      - name: Update docs-builder image reference in CI workflow
        run: |
          NEW_IMAGE="${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/docs-builder:${{ needs.build-and-push.outputs.tag }}@${{ needs.build-and-push.outputs.digest }}"
          # Run in Docker to prevent the script from accessing the environment.
          docker run --rm -v $PWD:/cilium -w /cilium "${NEW_IMAGE}" \
              bash -c "git config --global --add safe.directory /cilium && \
                       /cilium/Documentation/update-docs-builder-image.sh ${NEW_IMAGE}"
          git commit -sam "ci: update docs-builder"

      - name: Generate patch from update commit
        run: git format-patch HEAD~1 --stdout > /tmp/update.patch

      - name: Upload patch artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-builder-update-patch
          path: /tmp/update.patch
          retention-days: 1

  # Privileged job: applies the update on a fresh runner and pushes.
  # This runs on a clean workspace that was never touched by the untrusted
  # container, preventing hook injection or other workspace tampering attacks.
  push-update:
    name: Push docs-builder image reference update
    needs: [pr-info, build-and-push, prepare-update]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: docs-builder
      deployment: false
    steps:
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.SHA }}

      - name: Set up git
        run: |
          git config user.name "Cilium Imagebot"
          git config user.email "noreply@cilium.io"

      - name: Download patch artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-builder-update-patch
          path: /tmp

      - name: Apply update patch
        run: git am /tmp/update.patch

      - name: Get token
        id: get_token
        uses: cilium/actions-app-token@61a6271ce92ba02f49bf81c755685d59fb25a59a # v0.21.1
        with:
          APP_PEM: ${{ secrets.AUTO_COMMITTER_PEM_202411 }}
          APP_ID: ${{ secrets.AUTO_COMMITTER_APP_ID_202411 }}

      - name: Push changes into PR
        env:
          REF: ${{ needs.pr-info.outputs.head-ref }}
        run: |
          git diff HEAD^
          git push --no-verify https://x-access-token:${{ steps.get_token.outputs.app_token }}@github.com/${{ needs.pr-info.outputs.head-repo-full-name }}.git HEAD:"$REF"

  image-digest:
    name: Retrieve and display image digest
    needs: [pr-info, build-and-push]
    if: needs.build-and-push.outputs.digest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout base branch (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base-SHA || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set environment variables
        uses: ./.github/actions/set-env-variables

      - name: Retrieve image digest
        shell: bash
        run: |
          NEW_IMAGE="${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/docs-builder:${{ needs.build-and-push.outputs.tag }}@${{ needs.build-and-push.outputs.digest }}"
          mkdir -p image-digest/
          echo "## docs-builder" > image-digest/docs-builder.txt
          echo "" >> image-digest/docs-builder.txt
          echo "\`${NEW_IMAGE}\`" >> image-digest/docs-builder.txt
          echo "" >> image-digest/docs-builder.txt

      - name: Upload artifact digests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest docs-builder
          path: image-digest
          retention-days: 1

      - name: Output image digest
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat
