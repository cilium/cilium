name: Image CI Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  push:
    branches:
      - main
      - ft/main/**
  merge_group:
    types: [checks_requested]

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write
  # To be able to check if base images were built
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.PR-number || github.event.after || (github.event_name == 'merge_group' && github.run_id) }}
  cancel-in-progress: true

jobs:
  pr-info:
    name: Get PR Info
    runs-on: ubuntu-24.04
    outputs:
      same-repo: ${{ steps.pr.outputs.same_repo }}
      user-login: ${{ steps.pr.outputs.user_login }}
    steps:
      - name: Get pull request info
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            if (context.eventName !== 'workflow_dispatch') {
              core.setOutput('same_repo', 'false')
              core.setOutput('user_login', '')
              return
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ inputs.PR-number }}'),
            })
            core.setOutput('same_repo', String(pr.head.repo.full_name === pr.base.repo.full_name))
            core.setOutput('user_login', pr.user.login)

  wait-for-base-images:
    name: Wait for lint checks
    needs: pr-info
    uses: ./.github/workflows/wait-for-status-check.yaml
    with:
      # Only run this job if the event is workflow_dispatch and if the PR
      # is not opened from a fork.
      # This is to avoid waiting for base images on push to main or merge_group
      # events as the lint-images-base does not run on those events.
      if: ${{ github.event_name == 'workflow_dispatch' && needs.pr-info.outputs.same-repo == 'true' }}
      sha: ${{ inputs.SHA || github.sha }}
      lint-workflows: "lint-images-base.yaml"
      timeout-minutes: 2
      poll-interval: 15

  build-and-push-prs:
    timeout-minutes: 45
    name: Build and Push Images
    runs-on: ${{ vars.GH_RUNNER_EXTRA_POWER_UBUNTU_LATEST || 'ubuntu-24.04' }}
    needs: wait-for-base-images
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    strategy:
      # Only fail-fast on workflow_dispatch events. For push and merge_group events, we want to run all builds even
      # if some of them fail, to make sure one of the image is not broken accidentally and the PR is still merged.
      fail-fast: ${{ github.event_name != 'workflow_dispatch' }}
      matrix:
        include:
          - name: cilium
            dockerfile: ./images/cilium/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: cilium-cli
            dockerfile: ./cilium-cli/Dockerfile
            platforms: linux/amd64
            require-dir: cilium-cli

          - name: operator-aws
            dockerfile: ./images/operator/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: operator-azure
            dockerfile: ./images/operator/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: operator-alibabacloud
            dockerfile: ./images/operator/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: operator-generic
            dockerfile: ./images/operator/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: hubble-relay
            dockerfile: ./images/hubble-relay/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: clustermesh-apiserver
            dockerfile: ./images/clustermesh-apiserver/Dockerfile
            platforms: linux/amd64,linux/arm64

          - name: docker-plugin
            dockerfile: ./images/cilium-docker-plugin/Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout base or default branch (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # We first check if base-SHA exists, meaning we're in workflow_dispatch context, and if not we just use default_branch.
          ref: ${{ inputs.base-SHA || github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Copy scripts to trusted directory
        run: |
          mkdir -p ../cilium-base-branch/.github/actions
          cp -r .github/actions/set-runtime-image ../cilium-base-branch/.github/actions/
          cp -r .github/actions/cosign ../cilium-base-branch/.github/actions/

      - name: Check for disk usage and cleanup /mnt
        shell: bash
        run: |
          echo "# Disk usage"
          df -h
          echo "# Usage for /mnt"
          sudo du --human-readable \
                -- /mnt
          if compgen -G "/mnt/.*" > /dev/null; then
            echo "# Hidden files in /mnt:"
            sudo du --human-readable -- /mnt/.* 2>/dev/null
          fi
          echo "# Removing all contents of /mnt except /mnt/swapfile"
          sudo find /mnt -mindepth 1 ! -path /mnt/swapfile -exec rm -rf {} + || true

      - name: Setup docker volumes into /mnt
        # This allows us to make use of all available disk.
        shell: bash
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker/volumes /mnt/docker-volumes
          sudo ln -s /mnt/docker-volumes /var/lib/docker/volumes
          sudo systemctl start docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        # Disable GC entirely to avoid buildkit from GC caches.
        with:
          buildkitd-config-inline: |
            [worker.oci]
             gc=false

      - name: Login to ${{ env.REGISTRY_DEV }} for CI
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_DEV }}
          username: ${{ secrets.QUAY_USERNAME_CI }}
          password: ${{ secrets.QUAY_PASSWORD_CI }}

      - name: Getting image tag
        id: tag
        run: |
          if [ "${{ inputs.SHA }}" != "" ]; then
            sha=${{ inputs.SHA }}
          else
            sha=${{ github.sha }}
          fi
          echo sha=${sha} >> $GITHUB_OUTPUT

          tag=${sha}
          echo tag=${tag} >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name == 'push' }}" == "true" ]]; then
            if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
              floating_tag=latest
            else
              floating_tag="${{ github.ref_name }}"
              # Remove slashes from branch names
              floating_tag=${floating_tag##*/}
            fi
            echo floating_tag=${floating_tag} >> $GITHUB_OUTPUT
          fi

          normal_tag="${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${tag}"
          race_tag="${normal_tag}-race"
          unstripped_tag="${normal_tag}-unstripped"

          if [ -n "${floating_tag}" ]; then
            floating_normal_tag="${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${floating_tag}"
            normal_tag="${normal_tag},${floating_normal_tag}"
          fi

          if [[ "${{ github.event_name }}" == 'merge_group' || "${{ github.event_name }}" == 'push' ]]; then
            # Don't build race and unstripped images for merge_group or push events.
            race_tag=""
            unstripped_tag=""
          fi

          echo normal_tag=${normal_tag} >> $GITHUB_OUTPUT
          echo race_tag=${race_tag} >> $GITHUB_OUTPUT
          echo unstripped_tag=${unstripped_tag} >> $GITHUB_OUTPUT

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ steps.tag.outputs.sha }}

      - name: Check for disk usage
        shell: bash
        run: |
          df -h

      - name: Copy runtime image tag from untrusted branch
        run: |
          cp -r .github/actions/set-runtime-image/runtime-image*.txt ../cilium-base-branch/.github/actions/set-runtime-image/

      - name: Set runtime image environment variable
        uses: ./../cilium-base-branch/.github/actions/set-runtime-image
        with:
          repository: ${{ env.CILIUM_RUNTIME_IMAGE_PREFIX }}

      # Load Golang cache build from GitHub
      - name: Restore Golang cache build from GitHub
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: go-cache
        with:
          path: /tmp/.cache/go
          key: ${{ runner.os }}-go-${{ matrix.name }}-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.name }}-cache-

      - name: Check for disk usage
        shell: bash
        run: |
          df -h
          docker buildx du

      - name: Create cache directories if they don't exist
        if: ${{ steps.go-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          mkdir -p /tmp/.cache/go

      # Import GitHub's cache build to docker cache
      - name: Copy ${{ matrix.name }} Golang cache to docker cache
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          provenance: false
          context: /tmp/.cache/go
          file: ./images/cache/Dockerfile
          push: false
          platforms: linux/amd64
          target: import-cache

      - name: Check for disk usage
        shell: bash
        run: |
          df -h
          docker buildx du

      - name: Check build constraints
        id: check
        run: |
          if [[ -z "${{ matrix.require-dir }}" ]] ||
             [[ -d "${{ matrix.require-dir }}" ]]; then
            echo build="true" >> $GITHUB_OUTPUT
          fi

      - name: CI Build ${{ matrix.name }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: docker_build_ci
        if: ${{ steps.check.outputs.build != '' }}
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.tag.outputs.normal_tag }}
          target: release
          build-args: |
            CILIUM_RUNTIME_IMAGE=${{ env.CILIUM_RUNTIME_IMAGE }}
            OPERATOR_VARIANT=${{ matrix.name }}

      - name: CI race detection Build ${{ matrix.name }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: docker_build_ci_detect_race_condition
        if: ${{ steps.check.outputs.build != '' && steps.tag.outputs.race_tag != ''}}
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.race_tag }}
          target: release
          build-args: |
            BASE_IMAGE=${{ env.CILIUM_RUNTIME_IMAGE }}
            CILIUM_RUNTIME_IMAGE=${{ env.CILIUM_RUNTIME_IMAGE }}
            MODIFIERS="LOCKDEBUG=1 RACE=1"
            OPERATOR_VARIANT=${{ matrix.name }}

      - name: CI Unstripped Binaries Build ${{ matrix.name }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: docker_build_ci_unstripped
        if: ${{ steps.check.outputs.build != '' && steps.tag.outputs.unstripped_tag != ''}}
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.unstripped_tag }}
          target: release
          build-args: |
            CILIUM_RUNTIME_IMAGE=${{ env.CILIUM_RUNTIME_IMAGE }}
            MODIFIERS="NOSTRIP=1"
            OPERATOR_VARIANT=${{ matrix.name }}

      - name: Generate SBOM, Sign, and Attest Main CI Image
        if: ${{ matrix.name != 'cilium-cli' && steps.check.outputs.build != '' }}
        uses: ./../cilium-base-branch/.github/actions/cosign
        with:
          image: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci@${{ steps.docker_build_ci.outputs.digest }}"
          image_tag: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}"
          sbom_name: "ci_${{ matrix.name }}_${{ steps.tag.outputs.tag }}"

      - name: Generate SBOM, Sign, and Attest Race Detection Image
        if: ${{ matrix.name != 'cilium-cli' && steps.docker_build_ci_detect_race_condition.outcome != 'skipped' }}
        uses: ./../cilium-base-branch/.github/actions/cosign
        with:
          image: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci@${{ steps.docker_build_ci_detect_race_condition.outputs.digest }}"
          image_tag: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}-race"
          sbom_name: "ci_race_${{ matrix.name }}_${{ steps.tag.outputs.tag }}"
          install_cosign: 'false'

      - name: Generate SBOM, Sign, and Attest Unstripped Image
        if: ${{ matrix.name != 'cilium-cli' && steps.docker_build_ci_unstripped.outcome != 'skipped' }}
        uses: ./../cilium-base-branch/.github/actions/cosign
        with:
          image: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci@${{ steps.docker_build_ci_unstripped.outputs.digest }}"
          image_tag: "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}-unstripped"
          sbom_name: "ci_unstripped_${{ matrix.name }}_${{ steps.tag.outputs.tag }}"
          install_cosign: 'false'

      - name: CI Image Releases digests
        shell: bash
        if: ${{ steps.check.outputs.build != '' }}
        run: |
          mkdir -p image-digest/
          # shellcheck disable=SC2078
          if [ ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'ft/') }} ]; then
            echo "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.floating_tag }}@${{ steps.docker_build_ci.outputs.digest }}" > image-digest/${{ matrix.name }}.txt
          fi
          echo "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}@${{ steps.docker_build_ci.outputs.digest }}" >> image-digest/${{ matrix.name }}.txt
          if [[ "${{ steps.docker_build_ci_detect_race_condition.outcome }}" != 'skipped' ]]; then
            echo "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}-race@${{ steps.docker_build_ci_detect_race_condition.outputs.digest }}" >> image-digest/${{ matrix.name }}.txt
          fi
          if [[ "${{ steps.docker_build_ci_unstripped.outcome }}" != 'skipped' ]]; then
            echo "${{ env.REGISTRY_DEV }}/${{ env.ORGANIZATION_DEV }}/${{ matrix.name }}-ci:${{ steps.tag.outputs.tag }}-unstripped@${{ steps.docker_build_ci_unstripped.outputs.digest }}" >> image-digest/${{ matrix.name }}.txt
          fi

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ steps.check.outputs.build != '' }}
        with:
          name: image-digest ${{ matrix.name }}
          path: image-digest
          retention-days: 1

      - name: Check for disk usage
        if: ${{ always() }}
        shell: bash
        run: |
          df -h

  image-digests:
    if: ${{ always() }}
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push-prs
    steps:
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat

  push-chart:
    name: Push dev chart
    needs: build-and-push-prs
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    uses: ./.github/workflows/push-chart-ci.yaml
    with:
      checkout_ref: ${{ needs.build-and-push-prs.outputs.sha }}
      image_tag: ${{ needs.build-and-push-prs.outputs.sha }}
    secrets: inherit

  pre-comment:
    # Avoid running the "Trigger CI from renovate PRs" environment if we don't need to.
    name: Pre-Comment
    needs: [pr-info, build-and-push-prs]
    runs-on: ubuntu-24.04
    if: ${{
         github.event_name == 'workflow_dispatch' &&
         needs.pr-info.outputs.user-login == vars.RENOVATE_BOT_USERNAME
        }}
    steps:
    - name: Debug
      run: |
        echo ${{ needs.pr-info.outputs.user-login }}
        echo ${{ github.event.event_name }}

  comment:
    name: Post test comment for Renovate PRs after images built
    runs-on: ubuntu-24.04
    needs: [pr-info, pre-comment]
    environment:
      name: "Trigger CI from renovate PRs"
      deployment: false
    if: ${{
         github.event_name == 'workflow_dispatch' &&
         needs.pr-info.outputs.user-login == vars.RENOVATE_BOT_USERNAME
        }}
    steps:
      - name: Generate Github App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.AUTO_COMMENT_BOT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMENT_BOT_PEM }}
      - name: Post /test comment
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ inputs.PR-number }}
        run: |
          echo ${TOKEN} | gh auth login --with-token
          gh pr --repo ${GITHUB_REPOSITORY} comment ${PULL_REQUEST_NUMBER} --body "/test"
