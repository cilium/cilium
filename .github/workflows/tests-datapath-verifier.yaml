name: Datapath BPF Complexity (ci-verifier)

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with cilium/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write

concurrency:
  # Structure:
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - workflow_dispatch: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.PR-number)
    }}
  cancel-in-progress: true

env:
  # renovate: datasource=golang-version depName=go
  go-version: 1.25.9

jobs:
  echo-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Echo Workflow Dispatch Inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Echo Workflow Dispatch Inputs
        run: |
          echo '${{ tojson(inputs) }}'

  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-latest
    steps:
      - name: Set initial commit status
        uses: cilium/cilium/.github/actions/set-commit-status@9c189cdde5718056cabf473e7b435dfdb8c644b0 # main
        with:
          sha: ${{ inputs.SHA || github.sha }}

  setup-and-test:
    runs-on: ${{ vars.GH_RUNNER_EXTRA_POWER_UBUNTU_LATEST || 'ubuntu-latest' }}
    name: Setup & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: '5.4'
            ci-kernel: '54'
          - kernel: 'rhel8.10'
            ci-kernel: '54'
          - kernel: '5.10'
            ci-kernel: '510'
          - kernel: '5.15'
            ci-kernel: '510'
          - kernel: '6.1'
            ci-kernel: '61'
          - kernel: '6.6'
            ci-kernel: '61'
          - kernel: '6.12'
            ci-kernel: '61'
    timeout-minutes: 60
    steps:
      - name: Set commit status to pending
        uses: cilium/cilium/.github/actions/set-commit-status@9c189cdde5718056cabf473e7b435dfdb8c644b0 # main
        with:
          sha: ${{ inputs.SHA || github.sha }}

      - name: Collect Workflow Telemetry
        uses: cilium/workflow-telemetry-action@b1a318f80a08acede58027afe1455d037379966f # v2.2.0
        with:
          comment_on_pr: false

      - name: Checkout context ref (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.SHA || github.sha }}
          persist-credentials: false

      - name: Resolve full kernel version
        id: kernel-version
        run: |
          KERNEL="${{ matrix.kernel }}"
          case "$KERNEL" in
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "rhel8.10") FULL_KERNEL="rhel8.10-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "5.4") FULL_KERNEL="5.4-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "5.10") FULL_KERNEL="5.10-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "5.15") FULL_KERNEL="5.15-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "6.1") FULL_KERNEL="6.1-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "6.6") FULL_KERNEL="6.6-20260310.122539" ;;
            # renovate: datasource=docker depName=quay.io/lvh-images/complexity-test
            "6.12") FULL_KERNEL="6.12-20260310.122539" ;;
            *) FULL_KERNEL="$KERNEL" ;;
          esac
          echo "full=${FULL_KERNEL}" >> $GITHUB_OUTPUT

      - name: Provision LVH VMs
        uses: cilium/little-vm-helper@e249f34602b03d331320955be94cbaa2cc4fb6a8 # v0.0.29
        with:
          test-name: datapath-bpf-complexity
          image: 'complexity-test'
          image-version: ${{ steps.kernel-version.outputs.full }}
          host-mount: ./
          images-folder-parent: "/tmp"
          cpu: 4
          # renovate: datasource=github-tags depName=cilium/little-vm-helper
          lvh-version: "v0.0.29"
          install-dependencies: 'true'
          cmd: |
            for i in {1..5}; do curl "https://golang.org" > /dev/null 2>&1 && break || sleep 5; echo "Waiting for systemd-resolved to be ready..."; done

            git config --global --add safe.directory /host
            uname -a

            # Use /var/tmp for Go build temporary files to avoid running out
            # of disk space on the tmpfs-backed /tmp in the VM.
            export TMPDIR=/var/tmp

            # The LVH image might ship with an arbitrary Go toolchain version,
            # install the same Go toolchain version as current HEAD.
            CGO_ENABLED=0 GOPROXY=direct GOSUMDB= go install golang.org/dl/go${{ env.go-version }}@latest
            go${{ env.go-version }} download

            # Free up disk space: remove the pre-installed Go toolchain and
            # build caches, only go${{ env.go-version }} is needed from now on.
            go clean -cache -modcache
            rm -rf /usr/local/go

            # The LVH image ships with LLVM taken from a release Cilium version.
            # Replace it with the one extracted from the cilium-builder image.
            /host/contrib/scripts/extract-llvm.sh /var/tmp/llvm
            mv /var/tmp/llvm/usr/local/bin/{clang,llc} /bin/
            rm -r /var/tmp/llvm

      - name: Run verifier tests
        uses: cilium/little-vm-helper@e249f34602b03d331320955be94cbaa2cc4fb6a8 # v0.0.29
        with:
          provision: 'false'
          cmd: |
            cd /host
            export TMPDIR=/var/tmp
            export GOCACHE=/host/gocache
            mkdir -p /host/datapath-verifier /host/gocache
            # Run with cgo disabled, LVH images don't ship with gcc.
            CGO_ENABLED=0 go${{ env.go-version }} test -v -parallel=1 -timeout=20m ./test/verifier -cilium-base-path /host -ci-kernel-version ${{ matrix.ci-kernel }}

      - name: Fetch artifacts
        if: ${{ !success() }}
        uses: cilium/little-vm-helper@e249f34602b03d331320955be94cbaa2cc4fb6a8 # v0.0.29
        with:
          provision: 'false'
          cmd: |
            cd /host
            export TMPDIR=/var/tmp
            export GOCACHE=/host/gocache
            mkdir -p /host/datapath-verifier /host/gocache
            find test/verifier \( -name "*.log" -o -name "*.o" \) -exec cp -v {} /host/datapath-verifier/ \;

      - name: Upload artifacts
        if: ${{ !success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: datapath-verifier_${{ matrix.kernel }}
          path: datapath-verifier
          retention-days: 5

  commit-status-final:
    if: ${{ always() }}
    name: Commit Status Final
    needs: setup-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Set final commit status
        uses: cilium/cilium/.github/actions/set-commit-status@9c189cdde5718056cabf473e7b435dfdb8c644b0 # main
        with:
          sha: ${{ inputs.SHA || github.sha }}
          status: ${{ needs.setup-and-test.result }}
