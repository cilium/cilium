name: Cilium Tests With Extra Args (ci-extra-args)

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  # Run every 12 hours
  schedule:
    - cron:  '0 6/12 * * *'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with catchpoint/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write
  # To be able to request the JWT from GitHub's OIDC provider
  id-token: write

concurrency:
  # Structure:
  # - Parent concurrency group name to avoid deadlock with child workflows
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - workflow_dispatch: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    grandparent
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'push' && github.sha) ||
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.PR-number)
    }}
  cancel-in-progress: true

jobs:
  echo-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Echo Workflow Dispatch Inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Echo Workflow Dispatch Inputs
        run: |
          echo '${{ tojson(inputs) }}'

  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}

  wait-for-images:
    name: Wait for images
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout context ref (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false

      - name: Wait for images
        uses: ./.github/actions/wait-for-images
        with:
          SHA: ${{ inputs.SHA || github.sha }}

  e2e-upgrade-no-l7:
    name: E2E Upgrade without L7 Tests
    needs: wait-for-images
    uses: ./.github/workflows/tests-e2e-upgrade.yaml
    secrets: inherit
    with:
      PR-number: ${{ inputs.PR-number || github.ref_name }}
      context-ref: ${{ inputs.context-ref || github.sha }}
      SHA: ${{ inputs.SHA || github.sha }}
      extra-args: '{"connectivity-test-extra-filter": "!dns-only,!fqdn,!l7,!policy-local-cluster-egress,!client-egress-tls-sni"}'
      UID: 1

  conformance-ipsec-no-l7:
    name: Conformance IPsec without L7 Tests
    needs: wait-for-images
    uses: ./.github/workflows/conformance-ipsec.yaml
    secrets: inherit
    with:
      PR-number: ${{ inputs.PR-number || github.ref_name }}
      context-ref: ${{ inputs.context-ref || github.sha }}
      SHA: ${{ inputs.SHA || github.sha }}
      extra-args: '{"connectivity-test-extra-filter": "!dns-only,!fqdn,!l7,!policy-local-cluster-egress,!client-egress-tls-sni"}'
      UID: 1

  e2e-upgrade-only-l7:
    name: E2E Upgrade only L7 Tests
    needs: wait-for-images
    uses: ./.github/workflows/tests-e2e-upgrade.yaml
    secrets: inherit
    with:
      PR-number: ${{ inputs.PR-number || github.ref_name }}
      context-ref: ${{ inputs.context-ref || github.sha }}
      SHA: ${{ inputs.SHA || github.sha }}
      extra-args: '{"connectivity-test-extra-filter": "no-unexpected-packet-drops,check-log-errors,dns-only,fqdn,l7,policy-local-cluster-egress,client-egress-tls-sni"}'
      UID: 2

  conformance-ipsec-only-l7:
    name: Conformance IPsec only L7 Tests
    needs: wait-for-images
    uses: ./.github/workflows/conformance-ipsec.yaml
    secrets: inherit
    with:
      PR-number: ${{ inputs.PR-number || github.ref_name }}
      context-ref: ${{ inputs.context-ref || github.sha }}
      SHA: ${{ inputs.SHA || github.sha }}
      extra-args: '{"connectivity-test-extra-filter": "no-unexpected-packet-drops,check-log-errors,dns-only,fqdn,l7,policy-local-cluster-egress,client-egress-tls-sni"}'
      UID: 2

  merge-upload-and-status:
    name: Merge Upload and Status
    if: ${{ always() }}
    needs: [e2e-upgrade-no-l7, conformance-ipsec-no-l7, e2e-upgrade-only-l7, conformance-ipsec-only-l7]
    uses: ./.github/workflows/common-post-jobs.yaml
    secrets: inherit
    with:
      context-ref: ${{ inputs.context-ref || github.sha }}
      sha: ${{ inputs.SHA || github.sha }}
      success: ${{ (needs.e2e-upgrade-no-l7.result == 'success' && needs.conformance-ipsec-no-l7.result == 'success' && needs.e2e-upgrade-only-l7.result == 'success' && needs.conformance-ipsec-only-l7.result == 'success') }}

