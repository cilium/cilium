name: Conformance VTEP CRD

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    paths:
      - 'pkg/datapath/vtep/**'
      - 'pkg/maps/vtep/**'
      - 'pkg/k8s/apis/cilium.io/v2/vtep_types.go'
      - 'pkg/k8s/apis/cilium.io/client/crds/v2/ciliumvtepconfigs.yaml'
      - 'bpf/lib/vtep.h'
      - 'bpf/bpf_lxc.c'
      - 'bpf/bpf_host.c'
      - 'bpf/bpf_overlay.c'
      - 'test/vtep/**'
      - '.github/workflows/conformance-vtep.yaml'
      - '.github/actions/kind-vtep-responders/**'
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  push:
    branches:
      - main
      - ft/main/**
    paths:
      - 'pkg/datapath/vtep/**'
      - 'pkg/maps/vtep/**'
      - 'pkg/k8s/apis/cilium.io/v2/vtep_types.go'
      - 'pkg/k8s/apis/cilium.io/client/crds/v2/ciliumvtepconfigs.yaml'
      - 'bpf/lib/vtep.h'
      - 'bpf/bpf_lxc.c'
      - 'bpf/bpf_host.c'
      - 'bpf/bpf_overlay.c'
      - 'test/vtep/**'
      - '.github/workflows/conformance-vtep.yaml'
      - '.github/actions/kind-vtep-responders/**'
  schedule:
    - cron: '0 6 * * *'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with catchpoint/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.after || github.run_id }}
  cancel-in-progress: true

env:
  kind_config: .github/kind-config-vtep.yaml

jobs:
  echo-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Echo Workflow Dispatch Inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Echo Workflow Dispatch Inputs
        run: |
          echo '${{ tojson(inputs) }}'

  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}

  vtep-crd-test:
    name: "VTEP CRD Integration Test"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      job_name: "VTEP CRD Integration Test"
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout context ref (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Get Cilium's default values
        id: default_vars
        uses: ./.github/actions/helm-default
        with:
          image-tag: ${{ inputs.SHA || github.sha }}

      - name: Set up job variables
        id: vars
        run: |
          echo sha=${{ steps.default_vars.outputs.sha }} >> $GITHUB_OUTPUT

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@e3a20f4df0e49da32a381e8c91748f311d404134 # v0.19.1
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}
          repository: ${{ env.CILIUM_CLI_RELEASE_REPO }}
          release-version: ${{ env.CILIUM_CLI_VERSION }}

      - name: Wait for images to be available
        timeout-minutes: 30
        shell: bash
        run: |
          for image in cilium-ci operator-generic-ci ; do
            until docker manifest inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/$image:${{ steps.vars.outputs.sha }} &> /dev/null; do sleep 45s; done
          done

      # ── VTEP-specific setup ──

      - name: Create external Docker network
        uses: ./.github/actions/kind-external-network
        id: external_network

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: ${{ env.KIND_K8S_IMAGE }}
          kubectl_version: ${{ env.KIND_K8S_VERSION }}
          config: ${{ env.kind_config }}
          wait: 0

      - name: Label worker nodes
        run: |
          kubectl label node kind-worker topology.kubernetes.io/zone=zone-a
          kubectl label node kind-worker2 topology.kubernetes.io/zone=zone-b

      - name: Install Cilium
        id: install-cilium
        run: |
          cilium install ${{ steps.default_vars.outputs.cilium_install_defaults }} \
            --helm-set vtep.enabled=true \
            --helm-set tunnelProtocol=vxlan \
            --helm-set routingMode=tunnel

      - name: Wait for Cilium status to be ready
        run: |
          cilium status --wait --interactive=false
          kubectl -n kube-system get pods

      - name: Start VTEP responder containers
        uses: ./.github/actions/kind-vtep-responders
        id: vtep_responders
        with:
          kind_network: ${{ steps.external_network.outputs.kind_network }}

      - name: Apply CiliumVTEPConfig CRDs and probe pods
        run: |
          # Validate responder MACs are not empty
          VTEP_A_MAC="${{ steps.vtep_responders.outputs.vtep_a_mac }}"
          VTEP_B_MAC="${{ steps.vtep_responders.outputs.vtep_b_mac }}"
          if [ -z "$VTEP_A_MAC" ] || [ -z "$VTEP_B_MAC" ]; then
            echo "ERROR: Responder MAC addresses are empty (a=$VTEP_A_MAC, b=$VTEP_B_MAC)"
            exit 1
          fi

          # Replace placeholder MACs with actual responder MACs
          sed "s/PLACEHOLDER/$VTEP_A_MAC/" \
            test/vtep/manifests/zone-a-vtep.yaml | kubectl apply -f -
          sed "s/PLACEHOLDER/$VTEP_B_MAC/" \
            test/vtep/manifests/zone-b-vtep.yaml | kubectl apply -f -

          # Deploy probe pods
          kubectl apply -f test/vtep/manifests/probe-pods.yaml

          # Wait for CRD status to be Ready
          for i in $(seq 1 30); do
            SA=$(kubectl get ciliumvtepconfig zone-a -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            SB=$(kubectl get ciliumvtepconfig zone-b -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ "$SA" = "True" ] && [ "$SB" = "True" ]; then break; fi
            sleep 2
          done

      - name: Run VTEP integration tests
        env:
          VTEP_NETWORK: ${{ steps.external_network.outputs.kind_network }}
        run: |
          test/vtep/run-vtep-tests.sh

      # ── Post-test artifact collection ──

      - name: Collect VTEP debug info
        if: ${{ always() && steps.install-cilium.outcome != 'skipped' }}
        run: |
          mkdir -p cilium-junits
          echo "=== CiliumVTEPConfig resources ===" > vtep-debug.log
          kubectl get ciliumvtepconfigs -o yaml >> vtep-debug.log 2>&1 || true
          echo "" >> vtep-debug.log
          echo "=== VTEP BPF maps ===" >> vtep-debug.log
          for node in kind-control-plane kind-worker kind-worker2; do
            echo "--- $node ---" >> vtep-debug.log
            POD=$(kubectl -n kube-system get pod -l k8s-app=cilium \
              --field-selector spec.nodeName=$node \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              kubectl -n kube-system exec "$POD" -c cilium-agent -- \
                cilium-dbg bpf vtep list >> vtep-debug.log 2>&1 || true
            fi
          done
          echo "" >> vtep-debug.log
          echo "=== Responder logs ===" >> vtep-debug.log
          docker logs vtep-responder-a >> vtep-debug.log 2>&1 || true
          docker logs vtep-responder-b >> vtep-debug.log 2>&1 || true

      - name: Upload VTEP debug log
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: vtep-debug-log
          path: vtep-debug.log

      - name: Post-test information gathering
        if: ${{ always() && steps.install-cilium.outcome != 'skipped' }}
        uses: ./.github/actions/post-logic
        with:
          artifacts_suffix: ${{ env.job_name }}
          job_status: ${{ job.status }}

  commit-status-final:
    if: ${{ always() }}
    name: Commit Status Final
    needs: vtep-crd-test
    runs-on: ubuntu-24.04
    steps:
      - name: Set final commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}
          status: ${{ needs.vtep-crd-test.result }}
