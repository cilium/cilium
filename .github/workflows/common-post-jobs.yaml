name: Common Post Jobs

on:
  workflow_call:
    inputs:
      context-ref:
        required: true
        type: string
      sha:
        required: true
        type: string
      result:
        required: true
        type: string

permissions:
  contents: read
  actions: read
  statuses: write

jobs:
  merge-upload:
    if: ${{ always() && inputs.result != 'skipped' }}
    name: Merge and Upload Artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout context ref (trusted)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.context-ref }}
          persist-credentials: false

      - name: Merge Sysdumps
        uses: ./.github/actions/merge-artifacts
        with:
          name: cilium-sysdumps
          pattern: cilium-sysdumps-*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge JUnits
        uses: ./.github/actions/merge-artifacts
        with:
          name: cilium-junits
          pattern: cilium-junits-*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Features tested
        uses: ./.github/actions/merge-artifacts
        with:
          name: features-tested
          pattern: features-tested-*
          token: ${{ secrets.GITHUB_TOKEN }}
          separate-directories: true

  commit-status-final:
    if: ${{ always() }}
    name: Commit Status Final
    runs-on: ubuntu-24.04
    permissions:
      statuses: write
    steps:
      - name: Set final commit status
        if: ${{ inputs.result != 'skipped' }}
        uses: cilium/cilium/.github/actions/set-commit-status@74fb5f98372c3a0ab060b7256a53ec7dfb6dd9be # main
        with:
          sha: ${{ inputs.sha }}
          status: ${{ inputs.result == 'abandoned' && 'failure' || inputs.result }}

      - name: Set final commit status
        if: ${{ inputs.result == 'skipped' }}
        uses: cilium/cilium/.github/actions/set-commit-status@74fb5f98372c3a0ab060b7256a53ec7dfb6dd9be # main
        with:
          sha: ${{ inputs.sha }}
          status: ${{ github.event_name != 'schedule' && 'success' || 'failure' }}
          description: 'Skipped'