- name: 'netkit-1'
  kernel: '6.12'
  misc: 'bpf.datapathMode=netkit,bpf.masquerade=true'
  kube-proxy: 'none'
  kpr: 'true'
  tunnel: 'disabled'
  devices: 'eth0,eth1'
  secondary-network: 'true'
  ingress-controller: 'true'
  kvstore: 'true'
  # L7 testing: Netkit - no tunnel, can skip
  test-l7: 'false'
