# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_build:
      # Build the Lunr search index after Sphinx has produced the HTML output.
      # The script auto-detects $READTHEDOCS_OUTPUT/html (RTD v2) and falls
      # back to Documentation/_build/dirhtml for local builds.
      - python Documentation/_scripts/build_lunr_index.py

# Build documentation with Sphinx
sphinx:
  configuration: Documentation/conf.py
  builder: "dirhtml"

# We recommend specifying your dependencies to enable reproducible builds:
# https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
    - requirements: Documentation/requirements.txt
