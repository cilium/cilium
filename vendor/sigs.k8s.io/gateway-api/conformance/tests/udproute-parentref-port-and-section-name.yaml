apiVersion: v1
kind: Service
metadata:
  name: udp-echo-by-port
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-by-port
spec:
  selector:
    app: udp-echo-by-port
  ports:
    - name: udp
      protocol: UDP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-echo-by-port
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-by-port
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-echo-by-port
  template:
    metadata:
      labels:
        app: udp-echo-by-port
    spec:
      containers:
        - name: udp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.6.0-dev.2
          imagePullPolicy: IfNotPresent
          env:
            - name: UDP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: udp-echo-by-port
          ports:
            - containerPort: 8080
              protocol: UDP
          resources:
            requests:
              cpu: 10m
---
