---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-multi-listener-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: by-port
      protocol: UDP
      port: 5300
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: by-section
      protocol: UDP
      port: 5301
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: by-section-and-port
      protocol: UDP
      port: 5302
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
# Scenario 1: parentRef with `port` only -> attaches to the listener on port 5300.
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-route-by-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
      port: 5300
  rules:
    - backendRefs:
        - name: udp-echo-by-port
          port: 8080
---
# Scenario 2: parentRef with `sectionName` only -> attaches to the by-section listener.
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-route-by-section
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
      sectionName: by-section
  rules:
    - backendRefs:
        - name: udp-echo-by-section
          port: 8080
---
# Scenario 3: parentRef with both `sectionName` and `port` -> attaches to the by-section-and-port listener.
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-route-by-section-and-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
      sectionName: by-section-and-port
      port: 5302
  rules:
    - backendRefs:
        - name: udp-echo-by-section-and-port
          port: 8080
