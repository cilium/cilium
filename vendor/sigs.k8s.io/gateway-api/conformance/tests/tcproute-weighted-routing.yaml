---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-weighted-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: tcp
      protocol: TCP
      port: 9300
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-weighted-route
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-weighted-gateway
      sectionName: tcp
  rules:
    - backendRefs:
        - name: tcp-backend-v1
          port: 3000
          weight: 70
        - name: tcp-backend-v2
          port: 3000
          weight: 30
        - name: tcp-backend-v3
          port: 3000
          weight: 0
