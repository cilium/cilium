apiVersion: v1
kind: Service
metadata:
  name: tcp-backend-v1
  namespace: gateway-conformance-infra
  labels:
    app: tcp-backend-v1
spec:
  selector:
    app: tcp-backend-v1
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-backend-v1
  namespace: gateway-conformance-infra
  labels:
    app: tcp-backend-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-backend-v1
  template:
    metadata:
      labels:
        app: tcp-backend-v1
    spec:
      containers:
        - name: tcp-backend
          image: registry.k8s.io/gateway-api/echo-basic:v1.6.0-dev.2
          imagePullPolicy: IfNotPresent
          env:
            - name: TCP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: tcp-backend-v1
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
---
