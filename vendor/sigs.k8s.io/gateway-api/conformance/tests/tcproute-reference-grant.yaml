apiVersion: v1
kind: Service
metadata:
  name: tcp-reference-grant-backend
  namespace: gateway-conformance-web-backend
  labels:
    app: tcp-reference-grant-backend
spec:
  selector:
    app: tcp-reference-grant-backend
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-reference-grant-backend
  namespace: gateway-conformance-web-backend
  labels:
    app: tcp-reference-grant-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-reference-grant-backend
  template:
    metadata:
      labels:
        app: tcp-reference-grant-backend
    spec:
      containers:
        - name: tcp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TCP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: tcp-reference-grant-backend
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: tcp-reference-grant
  namespace: gateway-conformance-web-backend
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      namespace: gateway-conformance-infra
  to:
    - group: ""
      kind: Service
      name: tcp-reference-grant-backend
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-reference-grant-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: tcp
      protocol: TCP
      port: 9320
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-reference-grant
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-reference-grant-gateway
      sectionName: tcp
  rules:
    - backendRefs:
        - name: tcp-reference-grant-backend
          namespace: gateway-conformance-web-backend
          port: 3000
