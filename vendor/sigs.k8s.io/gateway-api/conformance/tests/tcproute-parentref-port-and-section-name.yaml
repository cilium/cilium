apiVersion: v1
kind: Service
metadata:
  name: tcp-echo-one
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-one
spec:
  selector:
    app: tcp-echo-one
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo-one
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-one
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo-one
  template:
    metadata:
      labels:
        app: tcp-echo-one
    spec:
      containers:
        - name: tcp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TCP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: tcp-echo-one
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
---
