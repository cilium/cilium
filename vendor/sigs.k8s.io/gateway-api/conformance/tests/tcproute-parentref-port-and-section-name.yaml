---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-multi-listener-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: one
      protocol: TCP
      port: 9300
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: two
      protocol: TCP
      port: 9301
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: three
      protocol: TCP
      port: 9302
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
# Scenario 1: parentRef with `port` only (matches listener `one` on port 9300).
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-route-by-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
      port: 9300
  rules:
    - backendRefs:
        - name: tcp-echo-one
          port: 3000
---
# Scenario 2: parentRef with `sectionName` only (matches listener `two`).
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-route-by-section
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
      sectionName: two
  rules:
    - backendRefs:
        - name: tcp-echo-two
          port: 3000
---
# Scenario 3: parentRef with both `sectionName` and `port` (listener `three`).
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-route-by-section-and-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
      sectionName: three
      port: 9302
  rules:
    - backendRefs:
        - name: tcp-echo-three
          port: 3000
