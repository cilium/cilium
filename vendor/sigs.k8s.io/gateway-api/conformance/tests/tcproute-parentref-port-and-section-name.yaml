apiVersion: v1
kind: Service
metadata:
  name: tcp-echo-three
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-three
spec:
  selector:
    app: tcp-echo-three
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo-three
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-three
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo-three
  template:
    metadata:
      labels:
        app: tcp-echo-three
    spec:
      containers:
        - name: tcp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
