apiVersion: v1
kind: Service
metadata:
  name: udp-echo-attach-all
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-attach-all
spec:
  selector:
    app: udp-echo-attach-all
  ports:
    - name: udp
      protocol: UDP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-echo-attach-all
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-attach-all
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-echo-attach-all
  template:
    metadata:
      labels:
        app: udp-echo-attach-all
    spec:
      containers:
        - name: udp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.6.0-dev.2
          imagePullPolicy: IfNotPresent
          env:
            - name: UDP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: udp-echo-attach-all
          ports:
            - containerPort: 8080
              protocol: UDP
          resources:
            requests:
              cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-attach-all-listeners-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: udp-1
      protocol: UDP
      port: 5310
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: udp-2
      protocol: UDP
      port: 5311
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: udp-3
      protocol: UDP
      port: 5312
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
# A UDPRoute with no `port` and no `sectionName` set on its parentRef should
# attach to every UDP listener on the Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-route-attach-all
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-attach-all-listeners-gateway
  rules:
    - backendRefs:
        - name: udp-echo-attach-all
          port: 8080
