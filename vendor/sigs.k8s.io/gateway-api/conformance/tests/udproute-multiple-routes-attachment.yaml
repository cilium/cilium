---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-multi-route-attach-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: udp
      protocol: UDP
      port: 5301
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udproute-attach-older
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-route-attach-gateway
      sectionName: udp
  rules:
    - backendRefs:
        - name: udp-attach-backend-1
          port: 8080
