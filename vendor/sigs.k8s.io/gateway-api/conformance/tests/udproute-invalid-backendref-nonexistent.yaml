apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-gateway-invalid-backend
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: udp
      protocol: UDP
      port: 5300
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-route-invalid-backend-ref-nonexistent
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-gateway-invalid-backend
      sectionName: udp
  rules:
    - backendRefs:
        - name: nonexistent-service
          port: 8080
