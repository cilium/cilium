apiVersion: v1
kind: Service
metadata:
  name: tcp-echo-attach-all
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-attach-all
spec:
  selector:
    app: tcp-echo-attach-all
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo-attach-all
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-attach-all
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo-attach-all
  template:
    metadata:
      labels:
        app: tcp-echo-attach-all
    spec:
      containers:
        - name: tcp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TCP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: tcp-echo-attach-all
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-attach-all-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: one
      protocol: TCP
      port: 9310
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: two
      protocol: TCP
      port: 9311
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: three
      protocol: TCP
      port: 9312
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: four
      protocol: TCP
      port: 9313
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
# parentRef with neither `port` nor `sectionName`. Should attach to every TCP
# listener on the Gateway, so traffic to any of the four listeners must reach
# the same backend.
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-route-attach-all
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-attach-all-gateway
  rules:
    - backendRefs:
        - name: tcp-echo-attach-all
          port: 3000
