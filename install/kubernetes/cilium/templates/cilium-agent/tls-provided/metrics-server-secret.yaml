{{- if and .Values.agent .Values.prometheus.enabled .Values.prometheus.tls.enabled (not .Values.prometheus.tls.auto.enabled) (not .Values.prometheus.tls.server.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: agent-metrics-server-certs
  namespace: {{ include "cilium.namespace" . }}

  {{- with .Values.commonLabels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  ca.crt:  {{ .Values.tls.ca.cert }}
  tls.crt: {{ .Values.prometheus.tls.server.cert | required "missing prometheus.tls.server.cert" }}
  tls.key: {{ .Values.prometheus.tls.server.key  | required "missing prometheus.tls.server.key"  }}
{{- end }}
